[profile.default]
src            = "src"
out            = "out"
libs           = ["lib"]
solc           = "0.8.24"
optimizer      = true
optimizer_runs = 200
via_ir         = true
fs_permissions = [{ access = "read-write", path = "./" }]
remappings     = ["@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/"]
ffi            = false

[profile.default.fuzz]
runs       = 10000
seed       = "0xdeadbeef"
max_test_rejects = 65536

[profile.default.invariant]
runs          = 256
depth         = 100
call_override = false

[rpc_endpoints]
qie_testnet = "https://rpc1testnet.qie.digital/"
qie_mainnet = "${QIE_MAINNET_RPC}"
anvil       = "http://127.0.0.1:8545"

[etherscan]
# Testnet — Blockscout (any non-empty string is accepted as API key)
qie_testnet = { key = "${QIE_EXPLORER_KEY}", url = "https://testnet.qie.digital/api", chain = 1983 }
# Mainnet — Blockscout (same pattern, different URL)
qie_mainnet = { key = "${QIE_EXPLORER_KEY}", url = "https://mainnet.qie.digital/api", chain = 1990 }
